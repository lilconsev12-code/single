  <style>
    :root {
      color-scheme: dark;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      background: linear-gradient(to top, #3d7a0c 24%, #78b2ff 24% 52%, #9dd7ff 100%);
      color: #000;
      font-family: Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      padding: 24px;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 25% 15%, rgba(255, 255, 255, 0.62), transparent 12%),
        radial-gradient(circle at 75% 12%, rgba(255, 255, 255, 0.38), transparent 16%),
        linear-gradient(to bottom, rgba(255, 255, 255, 0.12), transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .scene {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      max-width: none;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
      pointer-events: none;
    }

    .photo-stream {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .fly-card {
      position: absolute;
      width: 210px;
      height: 210px;
      border-radius: 18px;
      overflow: hidden;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      border: 2px solid rgba(255, 255, 255, 0.55);
      box-shadow: 0 24px 40px rgba(0, 0, 0, 0.18);
      filter: saturate(1.1) brightness(0.95);
      opacity: 0.96;
      will-change: transform, opacity;
    }

    .fly-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), transparent 40%);
      pointer-events: none;
    }

    @keyframes fly-right {
      0% { transform: translateX(0) rotate(-8deg); opacity: 0.1; }
      12% { opacity: 0.95; }
      48% { transform: translateX(calc(100vw + 480px)) rotate(2deg); opacity: 0.95; }
      88% { opacity: 0.95; }
      100% { transform: translateX(calc(100vw + 520px)) rotate(8deg); opacity: 0.1; }
    }

    .card {
      position: relative;
      max-width: 560px;
      width: 100%;
      background: #d6e7ff;
      border: 3px solid #5c88c1;
      border-radius: 10px;
      box-shadow: 0 24px 36px rgba(0, 0, 0, 0.16);
      padding: 18px 22px 24px;
      z-index: 2;
      text-align: left;
    }

    .card::before {
      content: "OHMAIGAH - Countdown";
      display: block;
      width: 100%;
      padding: 10px 14px;
      margin-bottom: 18px;
      background: linear-gradient(180deg, #0f4d9c, #123f82);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      border-radius: 6px 6px 0 0;
      box-shadow: inset 0 -1px 0 rgba(255, 255, 255, 0.12);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
      letter-spacing: 0;
      color: #112b53;
      font-weight: 700;
    }

    p.subtitle {
      margin: 0 0 28px;
      color: #2b4d88;
      font-size: 1rem;
      line-height: 1.4;
    }

    .countdown {
      display: grid;
      grid-template-columns: repeat(4, minmax(60px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .segment {
      background: #f4f7ff;
      border: 1px solid #9daecd;
      border-radius: 10px;
      padding: 18px 12px;
    }

    .segment .value {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1;
      color: #0f3a79;
    }

    .segment .label {
      margin-top: 8px;
      font-size: 0.9rem;
      color: #b1accd;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .button-wrap {
      display: flex;
      justify-content: center;
    }

    .presave-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px 22px;
      border: 2px solid #6b6b6b;
      border-radius: 4px;
      background: linear-gradient(180deg, #eaeaea 0%, #c4c4c4 100%);
      color: #111;
      font-size: 0.95rem;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      transition: background-color 0.2s ease, transform 0.2s ease;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.65);
      pointer-events: auto;
    }

    .presave-button:hover,
    .presave-button:focus-visible {
      background: linear-gradient(180deg, #fbfbfb 0%, #d8d8d8 100%);
      transform: translateY(-1px);
      outline: none;
    }

    .status {
      margin-top: 18px;
      color: #a5a0c2;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="photo-stream" aria-hidden="true"></div>

    <div class="card">
      <h1>OHMAIGAH</h1>
      <p class="subtitle">Single drops at 12:00 AM on April 16, 2026 in your timezone</p>

    <div class="countdown" aria-live="polite">
      <div class="segment">
        <div id="days" class="value">00</div>
        <div class="label">Days</div>
      </div>
      <div class="segment">
        <div id="hours" class="value">00</div>
        <div class="label">Hours</div>
      </div>
      <div class="segment">
        <div id="minutes" class="value">00</div>
        <div class="label">Minutes</div>
      </div>
      <div class="segment">
        <div id="seconds" class="value">00</div>
        <div class="label">Seconds</div>
      </div>
    </div>

    <div class="button-wrap">
      <a class="presave-button" href="https://distrokid.com/hyperfollow/consev/ohmaigah-2" target="_blank" rel="noopener noreferrer">
        Presave single to Spotify
      </a>
    </div>
    <p class="status" id="status-text">Countdown updates automatically for your local midnight.</p>
  </div>
  </div>

  <script>
    function getTargetMidnight() {
      return new Date(2026, 3, 16, 0, 0, 0, 0);
    }

    function pad(value) {
      return String(value).padStart(2, "0");
    }

    function updateCountdown() {
      const target = getTargetMidnight();
      const now = new Date();
      const diff = target - now;

      if (diff <= 0) {
        document.getElementById("days").textContent = "00";
        document.getElementById("hours").textContent = "00";
        document.getElementById("minutes").textContent = "00";
        document.getElementById("seconds").textContent = "00";
        document.getElementById("status-text").textContent = "OHMAIGAH is out now in your timezone!";
        return;
      }

      const secondsTotal = Math.floor(diff / 1000);
      const days = Math.floor(secondsTotal / 86400);
      const hours = Math.floor((secondsTotal % 86400) / 3600);
      const minutes = Math.floor((secondsTotal % 3600) / 60);
      const seconds = secondsTotal % 60;

      document.getElementById("days").textContent = pad(days);
      document.getElementById("hours").textContent = pad(hours);
      document.getElementById("minutes").textContent = pad(minutes);
      document.getElementById("seconds").textContent = pad(seconds);
      document.getElementById("status-text").textContent = `Next drop: 12:00 AM local time.`;
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);

    const photoFiles = [
      "139bf69a6e0bf8a926966e6adfb8ec76.jpg",
      "1922bc97a631528ac4962c137c317111.jpg",
      "2fc8d8c61cb61425564b44bd558672db.jpg",
      "2fd38932134700dae1b0cba72229edbe.jpg",
      "3903b954c22b8b9d697979288e87ae25.jpg",
      "55ac94c7ed9eb17157f94184ef0de43a.jpg",
      "52679fa6f3edc8f77dc58c814d85fba0.jpg",
      "6381718c458c1503e5cb50b318e0de33.jpg",
      "67ce78ea0a33d87d41403ccf272e4439.jpg",
      "699295e6e6b6678da8ffda94cbfa935c.jpg",
      "750e69a96510ecace4a7a98de7a698d7.jpg",
      "855e0fcc9a6b318ed8044aba204488e6.jpg",
      "8b88cc0a279ee1940e38f3062502945b.jpg",
      "9997c4c84d99286d3c69ffbea54fcc94.jpg",
      "9e4eb6e347296f2abf6d052d56b5671e.jpg",
      "a42e251d91540f8259f3417ddc6eee08.jpg",
      "b29ada83ae1db827d8935af255b3c592.jpg",
      "bb8024c1c05f4b52d609d2e628e545e3.jpg",
      "c10de00dc2fcfec02cc0c7bd84f88e2e.jpg",
      "c8d7d0b55b362858d7fbeea61c502242.jpg",
      "cf6c585a29e7caf16bb1dcdb7c010e47.jpg",
      "d8adfc51d20a99d2e7e3f6eeb877147a.jpg",
      "e1c2d84ff716acd43ca907e99657dfbe.jpg",
      "e89924ba-9f50-4f03-be6c-7e111ed80241.avif",
      "fd73376ec55497f5176bd8b15e1e619c.jpg"
    ];

    const stream = document.querySelector(".photo-stream");
    let nextPhotoIndex = 0;

    function randomBetween(min, max) {
      return min + Math.random() * (max - min);
    }

    function spawnFlyCard() {
      const card = document.createElement("div");
      card.className = "fly-card";
      const size = randomBetween(160, 240);
      card.style.width = `${size}px`;
      card.style.height = `${size}px`;
      card.style.top = `${randomBetween(4, 82)}%`;
      card.style.left = "-320px";
      card.style.backgroundImage = `url("${photoFiles[nextPhotoIndex]}")`;
      nextPhotoIndex = (nextPhotoIndex + 1) % photoFiles.length;
      const duration = randomBetween(14, 22);
      const delay = randomBetween(0, 1.2);
      const rotation = randomBetween(-10, 10);
      card.style.transform = `translateX(0) rotate(${rotation}deg)`;
      card.style.animation = `fly-right ${duration}s linear ${delay}s`;
      stream.appendChild(card);

      setTimeout(() => {
        card.remove();
      }, (duration + delay) * 1000 + 1200);
    }

    for (let i = 0; i < 18; i += 1) {
      setTimeout(spawnFlyCard, i * 260);
    }
    setInterval(spawnFlyCard, 300);
  </script>
</body>
